<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Nathan Chappie</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #050505;
      color: #eee;
      text-align: center;
      overflow-x: hidden;
    }

    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    h1.page-title {
      color: #fff;
      font-size: 3.5rem;
      margin: 4rem 0 1.5rem 0;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1.5rem 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 5rem; /* Standardized spacing */
      width: 100%;
    }

    .sticky-nav.is-stuck {
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem 0;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      max-width: 700px; /* Aligned with demos */
      width: 90%;
      margin: 2rem auto 5rem auto;
      z-index: 1;
    }

    .project-item {
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .project-item:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    .project-tag {
      font-size: 0.75rem;
      color: #FF7A5F;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
      margin-bottom: 0.75rem;
      display: block;
      font-weight: 700;
    }

    .project-title {
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 1rem;
      display: block;
      font-weight: 700;
    }

    .project-description {
      font-size: 1rem;
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .project-links {
      display: flex;
      gap: 1.5rem;
    }

    .project-link {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .project-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      flex-wrap: wrap; /* Mobile wrap */
    }

    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .nav-links i {
      font-size: 1.1rem;
    }

    .nav-links a.active {
      color: #fff;
      border-bottom: 2px solid #fff;
      padding-bottom: 4px;
    }

    @media (max-width: 768px) {
      h1.page-title {
        font-size: 2.2rem;
        margin: 3rem 0 1rem 0;
      }
      
      .nav-links {
        gap: 1.25rem;
      }
      
      .nav-links a {
        font-size: 0.95rem;
      }

      .sticky-nav {
        padding: 1rem 0;
        margin-bottom: 2.5rem;
      }

      .project-list {
        gap: 2rem;
      }

      .project-item {
        padding: 1.5rem;
      }

      .project-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
  <canvas id="starfield"></canvas>
  <div id="nav-sentinel" style="position: absolute; top: 0; height: 1px; width: 100%;"></div>
  
  <h1 class="page-title">Projects</h1>

  <header class="sticky-nav" id="main-nav">
    <nav class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> home</a>
      <a href="projects.html" class="active"><i class="fas fa-briefcase"></i> projects</a>
      <a href="demo/index.html"><i class="fas fa-play"></i> demos</a>
    </nav>
  </header>

  <div class="project-list" id="project-list">
    <!-- Projects will be injected here -->
  </div>

  <script>
    // Sticky Nav Observer
    const nav = document.getElementById('main-nav');
    const sentinel = document.getElementById('nav-sentinel');
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const rect = nav.getBoundingClientRect();
        if (!entry.isIntersecting && rect.top <= 0) {
          nav.classList.add('is-stuck');
        } else {
          nav.classList.remove('is-stuck');
        }
      });
    }, { threshold: [0] });

    observer.observe(sentinel);

    const projects = [
      {
        title: "retroOS",
        tagline: "KENT HACK ENOUGH 2025",
        description: "A retro-inspired operating system simulation built in less than 24 hours. Features a custom desktop environment with Aquarium, Chat, and Tic-Tac-Toe applications. Built with Godot/GDScript.",
        github: "https://github.com/chappey/retroOS",
        devpost: "https://devpost.com/software/retroos"
      },
      {
        title: "cavenet",
        tagline: "KENT HACK ENOUGH 2026",
        description: "What if cavemen had smartphones? A social feed app set in a caveman timeline. Powered by React and Bun + Elysia API, featuring AI-generated thread drafts and in-character replies.",
        github: "https://github.com/chappey/cavenet",
        devpost: "https://devpost.com/software/cavenet"
      }
    ];

    const listElement = document.getElementById('project-list');
    
    projects.forEach(project => {
      const item = document.createElement('div');
      item.className = 'project-item';
      item.innerHTML = `
        <span class="project-tag">${project.tagline}</span>
        <span class="project-title">${project.title}</span>
        <p class="project-description">${project.description}</p>
        <div class="project-links">
          <a href="${project.github}" target="_blank" class="project-link"><i class="fab fa-github"></i> github</a>
          <a href="${project.devpost}" target="_blank" class="project-link"><i class="fas fa-external-link-alt"></i> devpost</a>
        </div>
      `;
      listElement.appendChild(item);
    });
  </script>

  <script src="starfield.js"></script>
</body>

</html>
